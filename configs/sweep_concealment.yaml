mode: grid
base_config: configs/base.yaml
overrides:
  environment.seed: [42, 43, 44]
  communication_mode: ["none", "public"]
  oversight:
    - mode: "none"
      audit_probability: 0.0
      penalty_factor: 1.0
    - mode: "audit-penalty"
      audit_probability: 1.0
      penalty_factor: 0.5
      include_auditor_notice: true
      llm_judge_enabled: true
      llm_judge_model: gpt-4o-mini
      llm_judge_enforcement: judge_only
