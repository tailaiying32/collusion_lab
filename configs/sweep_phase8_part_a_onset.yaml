# Phase 8 Part A: Onset Threshold Study
# Objective: Identify the thresholds (Comm Mode, Memory, Count) for collusion emergence.
# Runs: 2 comm_modes * 3 windows * 2 counts * 5 seeds = 60 runs.

base_config: configs/base.yaml
mode: grid
overrides:
  communication_mode: ["none", "public"]
  agents.memory_window: [1, 5, 10]
  environment.n_agents: [2, 3]
  environment.seed: [101, 102, 103, 104, 105]
  oversight.mode: ["none"]
  oversight.audit_probability: [0.0]
