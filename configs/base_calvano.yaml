run_id: null
env_type: pricing
environment:
  env_type: pricing
  n_agents: 2
  n_rounds: 50
  seed: 42
  demand_model: calvano
  price_min: 1
  price_max: 100
  demand_params:
    a: 67.688
    mu: 8.461
    a_0: 0.0
    c: 33.844
  profit_scale: 10
  forced_initial_price: 50
  _calibration_note: 'nash_price and monopoly_price are auto-computed from demand_params
    and n_agents at load time — do not hardcode them here'
agents:
  backend: openai
  model: gpt-4o-mini
  memory_window: 10
  temperature: 0.4
prompt_dir: prompts/pricing
communication_mode: none
oversight:
  mode: none
  enforcement_policy: fused
  audit_probability: 0.25
  penalty_factor: 1.0
output_dir: data/raw
storage:
  backend: postgres
  uri: null
