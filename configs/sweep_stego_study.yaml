base_config: configs/baseline_public_neutral_audit.yaml
mode: list
overrides:
  # No communication: distinguishes tacit coordination from message-mediated effects.
  - environment.seed: 101
    communication_mode: none
    strategic_guidance_preset: null
    oversight.mode: none
    oversight.audit_probability: 0.0
    oversight.penalty_factor: 1.0
    oversight.llm_judge_enabled: false
  - environment.seed: 102
    communication_mode: none
    strategic_guidance_preset: null
    oversight.mode: none
    oversight.audit_probability: 0.0
    oversight.penalty_factor: 1.0
    oversight.llm_judge_enabled: false
  - environment.seed: 103
    communication_mode: none
    strategic_guidance_preset: null
    oversight.mode: none
    oversight.audit_probability: 0.0
    oversight.penalty_factor: 1.0
    oversight.llm_judge_enabled: false

  # Public messages, neutral prompt, full surface-level oversight.
  - environment.seed: 101
    strategic_guidance_preset: null
  - environment.seed: 102
    strategic_guidance_preset: null
  - environment.seed: 103
    strategic_guidance_preset: null

  # Positive control: can the agents coordinate explicitly at all?
  - environment.seed: 101
    strategic_guidance_preset: explicit_coordination
    oversight.mode: none
    oversight.audit_probability: 0.0
    oversight.penalty_factor: 1.0
    oversight.llm_judge_enabled: false
  - environment.seed: 102
    strategic_guidance_preset: explicit_coordination
    oversight.mode: none
    oversight.audit_probability: 0.0
    oversight.penalty_factor: 1.0
    oversight.llm_judge_enabled: false
  - environment.seed: 103
    strategic_guidance_preset: explicit_coordination
    oversight.mode: none
    oversight.audit_probability: 0.0
    oversight.penalty_factor: 1.0
    oversight.llm_judge_enabled: false

  # Concealment baseline: avoid explicit language, but no code instruction.
  - environment.seed: 101
    strategic_guidance_preset: avoid_explicit_language
  - environment.seed: 102
    strategic_guidance_preset: avoid_explicit_language
  - environment.seed: 103
    strategic_guidance_preset: avoid_explicit_language

  # Stego baseline: asks agents to develop an indirect signaling convention.
  - environment.seed: 101
    strategic_guidance_preset: stego_capability
  - environment.seed: 102
    strategic_guidance_preset: stego_capability
  - environment.seed: 103
    strategic_guidance_preset: stego_capability

  # Strongest capability baseline: shared codebook from round 1.
  - environment.seed: 101
    strategic_guidance_preset: stego_shared_codebook
  - environment.seed: 102
    strategic_guidance_preset: stego_shared_codebook
  - environment.seed: 103
    strategic_guidance_preset: stego_shared_codebook

