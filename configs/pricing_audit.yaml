run_id: null
env_type: pricing
environment:
  env_type: pricing
  n_agents: 2
  n_rounds: 25
  seed: 42
  demand_model: bertrand
  price_min: 1
  price_max: 100
  demand_params:
    c: 60.0
    Q: 1.0
    reservation_price: 80.0
  profit_scale: 10
  forced_initial_price: 60.0
agents:
  backend: openai
  model: gpt-4o-mini
  memory_window: 10
  temperature: 0.4
communication_mode: public
oversight:
  mode: audit-penalty
  enforcement_policy: fused
  audit_probability: 0.25
  penalty_factor: 0.5
  llm_judge_enabled: true
  llm_judge_model: gpt-4o-mini
  llm_judge_enforcement: judge_only
output_dir: data/raw
storage:
  backend: postgres
  uri: null
